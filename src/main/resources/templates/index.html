<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Virtual de Eletrônicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .hero { background: linear-gradient(135deg, #1a1a2e, #16213e); color: white; padding: 60px 0; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-lightning-charge-fill text-warning"></i> TechStore
        </span>
    </div>
</nav>

<div class="hero text-center">
    <div class="container">
        <h1 class="display-5 fw-bold"><i class="bi bi-cpu"></i> Loja Virtual de Eletrônicos</h1>
        <p class="lead mt-3">Sistema de Consulta de Produtos</p>
        <a th:href="@{/consulta}" class="btn btn-warning btn-lg mt-3">
            <i class="bi bi-search"></i> Consultar Produto
        </a>
    </div>
</div>

<div class="container mt-5 text-center">
    <div class="row justify-content-center g-4">
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <i class="bi bi-phone display-4 text-primary"></i>
                    <h5 class="mt-3">Smartphones</h5>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <i class="bi bi-laptop display-4 text-success"></i>
                    <h5 class="mt-3">Notebooks</h5>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <i class="bi bi-tv display-4 text-danger"></i>
                    <h5 class="mt-3">Televisores</h5>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <i class="bi bi-headphones display-4 text-warning"></i>
                    <h5 class="mt-3">Áudio</h5>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
